<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>India Investment Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #e2e8f0; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .gradient-text { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .ulip-badge { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
        .mf-badge { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="mb-8 flex justify-between items-center">
            <div>
                <h1 class="text-4xl font-bold gradient-text mb-2">Portfolio Tracker</h1>
                <p class="text-slate-400">ICICI Pru & Tata AIA Holdings</p>
            </div>
            <div class="text-right">
                <div class="text-3xl font-bold text-white" id="totalValue">₹0</div>
                <div class="text-sm text-slate-400" id="lastUpdated">Update pending</div>
            </div>
        </header>

        <!-- Configuration Panel -->
        <div class="glass rounded-2xl p-6 mb-6">
            <h2 class="text-xl font-semibold mb-4 flex items-center gap-2">
                <i data-lucide="wallet" class="w-5 h-5"></i>
                Configure Holdings
            </h2>
            
            <div class="space-y-4">
                <!-- ICICI Pru Maximiser Fund V (ULIP) -->
                <div class="bg-slate-800/50 border border-amber-500/30 rounded-lg p-4">
                    <div class="flex items-center gap-2 mb-3">
                        <span class="ulip-badge text-xs font-bold px-2 py-1 rounded text-white">ULIP</span>
                        <h3 class="font-semibold text-amber-400">ICICI Prudential Maximiser Fund V</h3>
                    </div>
                    <div class="grid md:grid-cols-3 gap-3">
                        <div>
                            <label class="block text-xs text-slate-400 mb-1">Units (Locked)</label>
                            <input type="number" id="maximiserUnits" value="35237.94" readonly 
                                class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 text-slate-300 cursor-not-allowed">
                        </div>
                        <div>
                            <label class="block text-xs text-slate-400 mb-1">Current NAV (Manual)</label>
                            <input type="number" id="maximiserNav" placeholder="e.g. 50.17" step="0.01"
                                class="w-full bg-slate-700 border border-amber-500/50 rounded px-3 py-2 text-white focus:border-amber-400 focus:outline-none">
                        </div>
                        <div>
                            <label class="block text-xs text-slate-400 mb-1">Calculated Value</label>
                            <div id="maximiserValue" class="text-xl font-bold text-amber-400 py-2">₹0</div>
                        </div>
                    </div>
                    <p class="text-xs text-slate-500 mt-2">
                        *ULIP NAV not available via API. Update manually from 
                        <a href="https://www.iciciprulife.com/fund-performance/equity-fund/maximiser-v-nav-history.html" target="_blank" class="text-amber-400 underline">ICICI Pru Portal</a>
                    </p>
                </div>

                <!-- Tata AIA ULIP -->
                <div class="bg-slate-800/50 border border-orange-500/30 rounded-lg p-4">
                    <div class="flex items-center gap-2 mb-3">
                        <span class="ulip-badge text-xs font-bold px-2 py-1 rounded text-white">ULIP</span>
                        <h3 class="font-semibold text-orange-400">Tata AIA ULIP</h3>
                    </div>
                    <div class="grid md:grid-cols-3 gap-3">
                        <input type="text" id="tataName" placeholder="Fund Name" class="bg-slate-700 border border-slate-600 rounded px-3 py-2 text-white">
                        <input type="number" id="tataNav" placeholder="NAV" step="0.01" class="bg-slate-700 border border-slate-600 rounded px-3 py-2 text-white">
                        <input type="number" id="tataUnits" placeholder="Units" step="0.001" class="bg-slate-700 border border-slate-600 rounded px-3 py-2 text-white">
                    </div>
                </div>

                <!-- Mutual Fund (If you actually have code 154265) -->
                <div class="bg-slate-800/50 border border-blue-500/30 rounded-lg p-4">
                    <div class="flex items-center gap-2 mb-3">
                        <span class="mf-badge text-xs font-bold px-2 py-1 rounded text-white">MUTUAL FUND</span>
                        <h3 class="font-semibold text-blue-400">Other Mutual Fund (Optional)</h3>
                    </div>
                    <div class="grid md:grid-cols-3 gap-3">
                        <input type="text" id="mfCode" placeholder="Scheme Code (e.g. 154265)" class="bg-slate-700 border border-slate-600 rounded px-3 py-2 text-white">
                        <input type="number" id="mfUnits" placeholder="Units" step="0.001" class="bg-slate-700 border border-slate-600 rounded px-3 py-2 text-white">
                        <div id="mfValue" class="text-xl font-bold text-blue-400 py-2">Auto-fetched</div>
                    </div>
                </div>
            </div>

            <button onclick="saveAndCalculate()" class="mt-6 w-full bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 text-white py-3 rounded-lg font-semibold transition-all">
                Save & Calculate Total
            </button>
        </div>

        <!-- Dashboard Cards -->
        <div class="grid md:grid-cols-3 gap-4" id="dashboard"></div>
    </div>

    <script>
        lucide.createIcons();

        // Load saved data
        window.onload = function() {
            const saved = localStorage.getItem('portfolioData');
            if (saved) {
                const data = JSON.parse(saved);
                document.getElementById('maximiserNav').value = data.maximiser?.nav || '';
                document.getElementById('tataName').value = data.tata?.name || '';
                document.getElementById('tataNav').value = data.tata?.nav || '';
                document.getElementById('tataUnits').value = data.tata?.units || '';
                document.getElementById('mfCode').value = data.mf?.code || '';
                document.getElementById('mfUnits').value = data.mf?.units || '';
                calculateAll();
            }
        };

        function saveAndCalculate() {
            const data = {
                maximiser: {
                    units: 35237.94,
                    nav: parseFloat(document.getElementById('maximiserNav').value) || 0
                },
                tata: {
                    name: document.getElementById('tataName').value || 'Tata AIA ULIP',
                    nav: parseFloat(document.getElementById('tataNav').value) || 0,
                    units: parseFloat(document.getElementById('tataUnits').value) || 0
                },
                mf: {
                    code: document.getElementById('mfCode').value,
                    units: parseFloat(document.getElementById('mfUnits').value) || 0
                }
            };
            localStorage.setItem('portfolioData', JSON.stringify(data));
            calculateAll();
            
            // Visual feedback
            const btn = document.querySelector('button');
            btn.textContent = 'Saved Successfully!';
            btn.classList.add('bg-green-600');
            setTimeout(() => {
                btn.textContent = 'Save & Calculate Total';
                btn.classList.remove('bg-green-600');
            }, 2000);
        }

        async function calculateAll() {
            const maximiserNav = parseFloat(document.getElementById('maximiserNav').value) || 0;
            const maximiserValue = 35237.94 * maximiserNav;
            document.getElementById('maximiserValue').textContent = formatCurrency(maximiserValue);

            const tataNav = parseFloat(document.getElementById('tataNav').value) || 0;
            const tataUnits = parseFloat(document.getElementById('tataUnits').value) || 0;
            const tataValue = tataNav * tataUnits;

            let mfValue = 0;
            const mfCode = document.getElementById('mfCode').value;
            const mfUnits = parseFloat(document.getElementById('mfUnits').value) || 0;
            
            if (mfCode && mfUnits) {
                mfValue = await fetchMFValue(mfCode, mfUnits);
            }

            const total = maximiserValue + tataValue + mfValue;
            document.getElementById('totalValue').textContent = formatCurrency(total);
            document.getElementById('lastUpdated').textContent = 'Updated: ' + new Date().toLocaleString();

            renderCards(maximiserValue, maximiserNav, tataValue, tataNav, tataUnits, mfValue);
        }

        async function fetchMFValue(code, units) {
            try {
                const response = await fetch(`https://api.mfapi.in/mf/${code}`);
                const data = await response.json();
                if (data.status === 'SUCCESS') {
                    const nav = parseFloat(data.data[0].nav);
                    return nav * units;
                }
            } catch (e) {
                console.error('MF fetch error:', e);
            }
            return 0;
        }

        function renderCards(maxVal, maxNav, tataVal, tataNav, tataUnits, mfVal) {
            const dashboard = document.getElementById('dashboard');
            let html = '';

            // ICICI Maximiser Card
            html += `
                <div class="glass rounded-xl p-6 border-l-4 border-amber-500">
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="font-bold text-lg">Maximiser Fund V</h3>
                        <span class="text-xs bg-amber-500/20 text-amber-300 px-2 py-1 rounded">ULIP</span>
                    </div>
                    <div class="space-y-1 text-sm mb-3">
                        <div class="flex justify-between"><span class="text-slate-400">Units:</span> <span>35,237.94</span></div>
                        <div class="flex justify-between"><span class="text-slate-400">NAV:</span> <span>₹${maxNav.toFixed(2)}</span></div>
                    </div>
                    <div class="text-2xl font-bold text-amber-400">${formatCurrency(maxVal)}</div>
                </div>
            `;

            // Tata AIA Card (if values exist)
            if (tataVal > 0) {
                html += `
                    <div class="glass rounded-xl p-6 border-l-4 border-orange-500">
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="font-bold text-lg">${document.getElementById('tataName').value || 'Tata AIA'}</h3>
                            <span class="text-xs bg-orange-500/20 text-orange-300 px-2 py-1 rounded">ULIP</span>
                        </div>
                        <div class="space-y-1 text-sm mb-3">
                            <div class="flex justify-between"><span class="text-slate-400">Units:</span> <span>${tataUnits}</span></div>
                            <div class="flex justify-between"><span class="text-slate-400">NAV:</span> <span>₹${tataNav.toFixed(2)}</span></div>
                        </div>
                        <div class="text-2xl font-bold text-orange-400">${formatCurrency(tataVal)}</div>
                    </div>
                `;
            }

            // MF Card (if applicable)
            if (mfVal > 0) {
                html += `
                    <div class="glass rounded-xl p-6 border-l-4 border-blue-500">
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="font-bold text-lg">Mutual Fund</h3>
                            <span class="text-xs bg-blue-500/20 text-blue-300 px-2 py-1 rounded">MF</span>
                        </div>
                        <div class="text-2xl font-bold text-blue-400">${formatCurrency(mfVal)}</div>
                        <div class="text-xs text-slate-400 mt-2">Auto-updated via API</div>
                    </div>
                `;
            }

            dashboard.innerHTML = html;
        }

        function formatCurrency(amount) {
            if (amount >= 10000000) return '₹' + (amount/10000000).toFixed(2) + ' Cr';
            if (amount >= 100000) return '₹' + (amount/100000).toFixed(2) + ' L';
            if (amount >= 1000) return '₹' + (amount/1000).toFixed(2) + ' K';
            return '₹' + amount.toFixed(2);
        }
    </script>
</body>
</html>
